---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-gateway
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: "10.9.8.8"
  listeners:
  - name: wireguard-udp
    protocol: UDP
    port: 50180
    allowedRoutes:
      kinds:
      - kind: UDPRoute
